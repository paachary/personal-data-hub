<!-- build/icon.svg -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#eff6ff"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shackleGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#2563eb" flood-opacity="0.25"/>
    </filter>
    <filter id="innerGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#ffffff" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- White rounded background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Subtle blue tint circle behind lock -->
  <circle cx="512" cy="560" r="320" fill="#dbeafe" opacity="0.5"/>

  <!-- Shackle (arc) -->
  <path d="M 340 480 L 340 320 A 172 172 0 0 1 684 320 L 684 480"
        fill="none"
        stroke="url(#shackleGrad)"
        stroke-width="88"
        stroke-linecap="round"
        filter="url(#softShadow)"/>

  <!-- Shackle inner highlight -->
  <path d="M 340 480 L 340 320 A 172 172 0 0 1 684 320 L 684 480"
        fill="none"
        stroke="#ffffff"
        stroke-width="28"
        stroke-linecap="round"
        opacity="0.35"/>

  <!-- Lock body -->
  <rect x="248" y="462" width="528" height="380" rx="64"
        fill="url(#lockGrad)"
        filter="url(#softShadow)"/>

  <!-- Lock body top shine -->
  <rect x="248" y="462" width="528" height="100" rx="64"
        fill="#ffffff" opacity="0.15"/>

  <!-- Keyhole circle -->
  <circle cx="512" cy="632" r="62"
          fill="#ffffff"
          filter="url(#innerGlow)"/>

  <!-- Keyhole slot -->
  <rect x="489" y="648" width="46" height="80" rx="14"
        fill="#2563eb"/>

  <!-- Keyhole dot -->
  <circle cx="512" cy="632" r="26" fill="#1d4ed8"/>

  <!-- Small shine dots on lock body -->
  <circle cx="320" cy="530" r="14" fill="#ffffff" opacity="0.3"/>
  <circle cx="352" cy="508" r="8"  fill="#ffffff" opacity="0.2"/>
</svg>